<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Long Asia | Support Terminal</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
   <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
   <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
   
   <!-- Premium Butter Smooth Scrolling Engine (Lenis) -->
   <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
   
   <style>
       /* Smooth scrolling styles for Lenis */
       html.lenis { height: auto; }
       .lenis.lenis-smooth { scroll-behavior: auto !important; }
       .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
       .lenis.lenis-stopped { overflow: hidden; }
       .lenis.lenis-scrolling iframe { pointer-events: none; }
       
       @keyframes fadeUp {
           from { opacity: 0; transform: translateY(30px); filter: blur(4px); }
           to { opacity: 1; transform: translateY(0); filter: blur(0); }
       }
       @keyframes popIn {
           from { opacity: 0; transform: scale(0.95) translateY(10px); }
           to { opacity: 1; transform: scale(1) translateY(0); }
       }
       @keyframes fadeInContent {
           from { opacity: 0; transform: translateX(20px); }
           to { opacity: 1; transform: translateX(0); }
       }
       .animate-fade-up { animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
       .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
       .animate-fade-in-content { animation: fadeInContent 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
       
       .delay-100 { animation-delay: 100ms; }
       .delay-200 { animation-delay: 200ms; }
       .delay-300 { animation-delay: 300ms; }
       .delay-400 { animation-delay: 400ms; }
       .delay-500 { animation-delay: 500ms; }
       body { background-color: black; margin: 0; overflow-x: hidden; }
       ::-webkit-scrollbar { width: 5px; }
       ::-webkit-scrollbar-track { background: #000; }
       ::-webkit-scrollbar-thumb { background: #333; }
       ::-webkit-scrollbar-thumb:hover { background: #555; }
   </style>
</head>
<body>
   <div id="root"></div>

   <script type="text/babel">
       const { useState, useEffect, useRef } = React;

       // Base Icon Component
       const Icon = ({ path, viewBox="0 0 24 24", className="w-6 h-6" }) => (
           <svg className={className} fill="none" stroke="currentColor" viewBox={viewBox} xmlns="http://www.w3.org/2000/svg">
               <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={path}></path>
           </svg>
       );

       // Advanced Icons
       const MailIcon = ({className="w-6 h-6"}) => (
           <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
       );
       const BotIcon = ({className="w-6 h-6"}) => (
           <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 8V4H8"></path><rect x="4" y="8" width="16" height="12" rx="2" ry="2"></rect><path d="M2 14h2"></path><path d="M20 14h2"></path><path d="M15 13v2"></path><path d="M9 13v2"></path></svg>
       );

       const paths = {
           withdrawal: "M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z",
           transparency: "M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4",
           trading: "M13 7h8m0 0v8m0-8l-8 8-4-4-6 6",
           problems: "M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z",
           security: "M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z",
           accountability: "M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z",
           menu: "M4 6h16M4 12h16M4 18h16",
           close: "M6 18L18 6M6 6l12 12"
       };

       const faqData = [
           {
               id: 'w', title: 'Updates related to deposit and withdrawal', icon: paths.withdrawal,
               questions: [
                   { q: "When will normal withdrawals be fully restored?", a: "Normal withdrawals are expected to be fully restored within the next 4 to 6 weeks as we upgrade our infrastructure." },
                   { q: "Why were external withdrawals suddenly stopped?", a: "A precautionary security halt was triggered due to irregular routing detected from a provider." },
                   { q: "Is there any official timeline for resolution?", a: "Yes, we anticipate a phased rollout starting mid-next month, prioritizing VIP accounts first." },
                   { q: "Are funds fully backed?", a: "Absolutely. All client funds are held in segregated Tier-1 accounts and backed 1:1." },
                   { q: "Can I withdraw the full amount?", a: "Yes, once the gateway is restored, full balances will be available for withdrawal." },
                   { q: "Why was P2P introduced?", a: "To provide an immediate alternative liquidity path while the main system is overhauled." },
                   { q: "Is the restriction permanent?", a: "No, this is a temporary structural upgrade period." },
                   { q: "What is the guarantee?", a: "Balances are fixed on an immutable ledger and we are legally committed to processing all requests." }
               ]
           },
           {
               id: 't', title: 'Company Transparency', icon: paths.transparency,
               questions: [
                   { q: "Where are funds stored?", a: "Stored in Tier-1 institutional banks and high-liquidity trading pools." },
                   { q: "Is there proof of reserves?", a: "We are currently finalizing an independent audit to publish Proof of Reserves (PoR) this quarter." },
                   { q: "Are financial reports audited?", a: "Reports are currently available to institutional clients; retail summaries are coming soon." },
                   { q: "Who manages the funds?", a: "A dedicated Risk and Asset Management Committee of verified industry veterans." },
                   { q: "Is the company regulated?", a: "We operate under the regulatory frameworks of our incorporated jurisdictions with full AML/KYC." },
                   { q: "What legal protection exists?", a: "Segregated fund mandates and platform-level contingency insurance." }
               ]
           },
           {
               id: 'm', title: 'Trading & Profit Model', icon: paths.trading,
               questions: [
                   { q: "What is the business model?", a: "High-frequency quantitative trading (HFT) and statistical arbitrage." },
                   { q: "Is profit from real trading?", a: "Yes, returns come strictly from market activities, never from new user deposits." },
                   { q: "Can I see trading history?", a: "Aggregated execution logs and periodic reports are provided in the dashboard." },
                   { q: "What is the risk management?", a: "Automated stop-losses, drawdown limits, and dynamic position sizing." },
                   { q: "How is a crash handled?", a: "We use delta-neutral strategies designed to remain stable regardless of market direction." }
               ]
           },
           {
               id: 'p', title: 'Current Problems', icon: paths.problems,
               questions: [
                   { q: "What caused the current problem?", a: "Unexpected regulatory shifts by banking partners and a core database migration." },
                   { q: "Is this a liquidity shortage?", a: "No. It is purely a technical routing and compliance processing issue." },
                   { q: "Why no earlier notice?", a: "The situation evolved rapidly; we prioritized network security before public communication." },
                   { q: "What steps are being taken?", a: "Integrating three new redundant payment processors and expanding our compliance team." },
                   { q: "Happened before?", a: "This is a unique growth-related bottleneck, treated with the highest priority." }
               ]
           },
           {
               id: 's', title: 'Future Security', icon: paths.security,
               questions: [
                   { q: "Will this happen again?", a: "Redundant multi-node gateways are being implemented to eliminate single points of failure." },
                   { q: "Will there be regular reports?", a: "Yes, we are moving to monthly operational updates and quarterly asset reports." },
                   { q: "Can I access funds 24/7?", a: "Yes, standard 24/7 access will resume once upgrades are finalized." },
                   { q: "What is the long-term plan?", a: "Diversifying regulatory footprints and fully automating the withdrawal pipeline." },
                   { q: "How to stop investing?", a: "A full account closure triggers a final settlement to your linked bank account." }
               ]
           },
           {
               id: 'a', title: 'Final Accountability', icon: paths.accountability,
               questions: [
                   { q: "What if withdrawals aren't restored?", a: "We are confident in restoration, but we have a legal liquidation plan to return capital via alternative channels." }
               ]
           }
       ];

       const FAQItem = ({ q, a }) => {
           const [open, setOpen] = useState(false);
           return (
               <div className="border border-white/10 mb-4 bg-white/5 backdrop-blur-sm transition-all duration-500 hover:-translate-y-1 hover:border-white/40 hover:shadow-[0_0_20px_rgba(255,255,255,0.1)] group">
                   <button onClick={() => setOpen(!open)} className="w-full px-8 py-6 text-left flex justify-between items-center focus:outline-none">
                       <span className={`font-medium text-lg tracking-wide transition-all ${open ? 'text-white [text-shadow:0_0_10px_rgba(255,255,255,0.6)]' : 'text-white/80 group-hover:text-white'}`}>{q}</span>
                       <div className={`p-2 border rounded-full transition-all ${open ? 'bg-white text-black' : 'border-white/20'}`}>
                           {open ? '−' : '+'}
                       </div>
                   </button>
                   <div className={`px-8 overflow-hidden transition-all duration-500 ${open ? 'max-h-96 pb-6 opacity-100' : 'max-h-0 opacity-0'}`}>
                       <p className="text-neutral-400 font-light leading-relaxed">{a}</p>
                   </div>
               </div>
           );
       };

       const ChatWidget = ({ isOpen, onClose }) => {
           const [messages, setMessages] = useState([{ sender: 'bot', text: 'Hello! I am the Long Asia Support AI. How can I assist you today?' }]);
           const [input, setInput] = useState('');
           const [isLoading, setIsLoading] = useState(false);
           const endOfMessagesRef = useRef(null);

           useEffect(() => {
               if(endOfMessagesRef.current) endOfMessagesRef.current.scrollIntoView({ behavior: 'smooth' });
           }, [messages, isOpen, isLoading]);

           // Gemini API Setup
           const apiKey = "";
           const model = "gemini-2.5-flash-preview-09-2025";
           const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

           const systemPrompt = `You are the official Support Bot for Long Asia Wealth Management. Answer user queries politely, professionally, and concisely.
           Use the following internal knowledge to answer:
           - Withdrawals: Normal withdrawals will be restored in 4 to 6 weeks. Phased rollout starts mid-next month.
           - Cause: Precautionary security halt due to irregular API routing from a 3rd party.
           - Security: Funds are fully backed 1:1 in Tier-1 institutional accounts.
           - P2P Portal: Available as an immediate, alternative withdrawal method.
           - Support: If a user has a highly specific account issue you cannot answer, tell them to email support@longasiagroups.com.
           Keep all answers short (2-3 sentences max).`;

           const handleSend = async (e) => {
               e.preventDefault();
               const userQuery = input.trim();
               if (!userQuery) return;
               
               setMessages(prev => [...prev, { sender: 'user', text: userQuery }]);
               setInput('');
               setIsLoading(true);

               const payload = {
                   contents: [{ parts: [{ text: userQuery }] }],
                   systemInstruction: { parts: [{ text: systemPrompt }] }
               };

               const delays = [1000, 2000, 4000, 8000, 16000];
               let attempt = 0;
               let botResponse = "I am currently experiencing high network traffic. Please try again later or email support@longasiagroups.com.";

               while (attempt < delays.length + 1) {
                   try {
                       const response = await fetch(endpoint, {
                           method: 'POST',
                           headers: { 'Content-Type': 'application/json' },
                           body: JSON.stringify(payload)
                       });

                       if (!response.ok) throw new Error('API Error');

                       const data = await response.json();
                       botResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm sorry, I couldn't process that.";
                       break;
                   } catch (err) {
                       if (attempt < delays.length) {
                           await new Promise(resolve => setTimeout(resolve, delays[attempt]));
                           attempt++;
                       } else {
                           break;
                       }
                   }
               }

               setMessages(prev => [...prev, { sender: 'bot', text: botResponse }]);
               setIsLoading(false);
           };

           if (!isOpen) return null;

           return (
               <div className="fixed bottom-4 right-4 sm:bottom-8 sm:right-8 w-[90vw] sm:w-[380px] bg-black border border-white/20 rounded-xl shadow-[0_0_30px_rgba(0,0,0,0.8)] z-[100] flex flex-col overflow-hidden animate-pop-in backdrop-blur-3xl">
                   {/* Header */}
                   <div className="bg-white/5 px-4 py-3 border-b border-white/10 flex justify-between items-center">
                       <div className="flex items-center gap-3">
                           <BotIcon className="w-5 h-5 text-white" />
                           <span className="font-bold text-xs tracking-widest uppercase text-white">Support Bot (AI)</span>
                       </div>
                       <button onClick={onClose} className="text-neutral-500 hover:text-white transition-colors">
                           <Icon path={paths.close} className="w-5 h-5" />
                       </button>
                   </div>
                   
                   {/* Messages Area */}
                   <div className="p-4 h-72 overflow-y-auto flex flex-col gap-4 bg-gradient-to-b from-transparent to-white/5" data-lenis-prevent>
                       {messages.map((msg, idx) => (
                           <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                               <div className={`p-3 rounded-lg text-sm max-w-[85%] leading-relaxed ${msg.sender === 'user' ? 'bg-white text-black rounded-tr-none' : 'bg-white/10 text-white rounded-tl-none border border-white/5'}`}>
                                   {msg.text}
                               </div>
                           </div>
                       ))}
                       {isLoading && (
                           <div className="flex justify-start">
                               <div className="p-3 rounded-lg bg-white/10 text-white rounded-tl-none border border-white/5 flex gap-1 items-center">
                                   <div className="w-2 h-2 bg-white/50 rounded-full animate-pulse"></div>
                                   <div className="w-2 h-2 bg-white/50 rounded-full animate-pulse" style={{animationDelay: '0.2s'}}></div>
                                   <div className="w-2 h-2 bg-white/50 rounded-full animate-pulse" style={{animationDelay: '0.4s'}}></div>
                               </div>
                           </div>
                       )}
                       <div ref={endOfMessagesRef} />
                   </div>

                   {/* Input Area */}
                   <form onSubmit={handleSend} className="p-3 border-t border-white/10 flex gap-2 bg-black">
                       <input
                           type="text"
                           value={input}
                           onChange={(e) => setInput(e.target.value)}
                           placeholder="Ask a question..."
                           className="flex-1 bg-white/5 border border-white/20 rounded px-4 py-2 text-sm text-white focus:outline-none focus:border-white/50 transition-colors"
                           disabled={isLoading}
                       />
                       <button type="submit" disabled={isLoading} className="bg-white text-black px-4 py-2 text-xs font-bold uppercase tracking-wider rounded hover:bg-neutral-200 transition-colors disabled:opacity-50">
                           Send
                       </button>
                   </form>
               </div>
           );
       };

       const App = () => {
           const [active, setActive] = useState(faqData[0].id);
           const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
           const [chatOpen, setChatOpen] = useState(false);

           // Get the currently active category data
           const activeCategoryData = faqData.find(cat => cat.id === active);

           // Initialize Butter Smooth Scrolling
           useEffect(() => {
               const lenis = new Lenis({
                   duration: 1.5,
                   easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                   smoothWheel: true,
                   wheelMultiplier: 1,
               });

               function raf(time) {
                   lenis.raf(time);
                   requestAnimationFrame(raf);
               }

               requestAnimationFrame(raf);

               return () => lenis.destroy();
           }, []);

           return (
               <div className="min-h-screen text-white relative">
                   {/* Grid BG */}
                   <div className="fixed inset-0 pointer-events-none bg-[linear-gradient(to_right,#ffffff08_1px,transparent_1px),linear-gradient(to_bottom,#ffffff08_1px,transparent_1px)] bg-[size:3rem_3rem]"></div>
                   
                   {/* Nav */}
                   <nav className="fixed w-full z-50 bg-black/50 backdrop-blur-xl border-b border-white/10 px-4 sm:px-8 h-24 md:h-32 flex items-center justify-between">
                       {/* Logo */}
                       <a href="#" className="flex items-center cursor-pointer z-50">
                           <img src="https://i.ibb.co/kVwvjjrR/long-asia-png.png" className="h-[70px] sm:h-[100px] md:h-[130px] w-auto object-contain grayscale brightness-0 invert hover:scale-105 transition-all duration-500" alt="Long Asia" />
                       </a>

                       {/* Desktop Nav Links */}
                       <div className="hidden lg:flex space-x-8 items-center z-10 absolute left-1/2 -translate-x-1/2">
                           <a href="#" className="text-neutral-400 hover:text-white transition-colors text-[10px] md:text-xs tracking-[0.2em] uppercase font-medium">Home</a>
                           <a href="#" className="text-neutral-400 hover:text-white transition-colors text-[10px] md:text-xs tracking-[0.2em] uppercase font-medium">About Us</a>
                           <a href="#" className="text-white font-medium text-[10px] md:text-xs tracking-[0.2em] uppercase relative">
                               Support & FAQ
                               <span className="absolute -bottom-2 left-0 w-full h-[2px] bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)]"></span>
                           </a>
                           <a href="#" className="text-neutral-400 hover:text-white transition-colors text-[10px] md:text-xs tracking-[0.2em] uppercase font-medium">Contact</a>
                       </div>

                       {/* Right Side Buttons & Icons */}
                       <div className="flex items-center space-x-2 sm:space-x-4 z-50">
                           {/* P2P and User Login Buttons (Desktop) */}
                           <a href="https://p2p.longasiagroup.com/" target="_blank" className="relative px-4 py-2 md:px-6 md:py-2.5 bg-white text-black uppercase tracking-widest text-[10px] md:text-xs font-bold hover:bg-neutral-200 transition-all hidden xl:block shadow-[0_0_15px_rgba(255,255,255,0.2)]">P2P Withdrawal</a>
                           <a href="https://login.longasiagroups.com/" target="_blank" className="relative px-4 py-2 md:px-6 md:py-2.5 border border-white/30 uppercase tracking-widest text-[10px] md:text-xs font-bold hover:bg-white/10 text-white transition-all hidden sm:block">User login</a>
                           
                           {/* Email Support Icon */}
                           <a href="mailto:support@longasiagroups.com" className="p-2 text-white hover:text-neutral-400 transition-colors rounded-full hover:bg-white/5">
                               <MailIcon className="w-6 h-6 sm:w-7 sm:h-7" />
                           </a>
                           
                           {/* Support Bot Icon */}
                           <button onClick={() => setChatOpen(true)} className="p-2 text-white hover:text-neutral-400 transition-colors rounded-full hover:bg-white/5">
                               <BotIcon className="w-6 h-6 sm:w-7 sm:h-7" />
                           </button>

                           {/* Mobile Menu Toggle Button */}
                           <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="lg:hidden p-2 text-white hover:text-neutral-300 transition-colors">
                               <Icon path={mobileMenuOpen ? paths.close : paths.menu} className="w-6 h-6 sm:w-7 sm:h-7" />
                           </button>
                       </div>
                   </nav>

                   {/* Chat Widget rendering */}
                   <ChatWidget isOpen={chatOpen} onClose={() => setChatOpen(false)} />

                   {/* Mobile Menu Overlay */}
                   <div className={`fixed inset-0 bg-black/95 backdrop-blur-3xl z-40 flex flex-col items-center justify-center space-y-6 transition-all duration-500 lg:hidden ${mobileMenuOpen ? 'opacity-100 pointer-events-auto translate-y-0' : 'opacity-0 pointer-events-none -translate-y-8'}`}>
                       <a href="#" className="text-white text-xl tracking-[0.2em] uppercase font-medium hover:text-neutral-400 transition-colors" onClick={() => setMobileMenuOpen(false)}>Home</a>
                       <a href="#" className="text-white text-xl tracking-[0.2em] uppercase font-medium hover:text-neutral-400 transition-colors" onClick={() => setMobileMenuOpen(false)}>About Us</a>
                       <a href="#" className="text-white text-xl tracking-[0.2em] uppercase font-medium relative" onClick={() => setMobileMenuOpen(false)}>
                           Support & FAQ
                           <span className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1/2 h-[2px] bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)]"></span>
                       </a>
                       <a href="#" className="text-white text-xl tracking-[0.2em] uppercase font-medium hover:text-neutral-400 transition-colors" onClick={() => setMobileMenuOpen(false)}>Contact</a>
                       
                       <div className="flex flex-col items-center gap-4 mt-8 w-full max-w-xs px-4">
                           <a href="https://p2p.longasiagroup.com/" target="_blank" className="w-full py-4 bg-white text-black uppercase tracking-widest text-sm font-bold text-center transition-all shadow-[0_0_15px_rgba(255,255,255,0.2)]">P2P Withdrawal</a>
                           <a href="https://login.longasiagroups.com/" target="_blank" className="w-full py-4 border border-white/30 uppercase tracking-widest text-sm font-bold bg-transparent text-white text-center transition-all">User login</a>
                       </div>
                   </div>

                   {/* Hero */}
                   <header className="pt-48 md:pt-64 pb-24 text-center px-4 relative z-10">
                       {/* Status Bar with Green Dot on the Right */}
                       <div className="inline-flex items-center space-x-3 bg-white/5 border border-white/20 px-5 py-2 text-[10px] tracking-[.3em] uppercase mb-8 animate-fade-up delay-100 shadow-[0_0_15px_rgba(255,255,255,0.05)] rounded-full">
                           <span>System Status: Operational</span>
                           <span className="w-2.5 h-2.5 bg-green-500 rounded-full animate-[pulse_2s_infinite] shadow-[0_0_10px_rgba(34,197,94,0.9)]"></span>
                       </div>
                       
                       <h1 className="text-5xl md:text-7xl lg:text-8xl font-light uppercase tracking-tighter animate-fade-up delay-200">
                           Support <span className="font-bold [text-shadow:0_0_30px_rgba(255,255,255,0.4)]">Terminal</span>
                       </h1>
                       <p className="max-w-xl mx-auto mt-6 text-neutral-500 font-light text-lg animate-fade-up delay-300">Detailed operational parameters, network upgrades, and fund security protocols.</p>
                       
                       {/* Deposit/Withdrawal & Login CTA Section */}
                       <div className="mt-12 flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-6 animate-fade-up delay-400">
                           <a href="https://p2p.longasiagroup.com/" target="_blank" className="px-8 py-4 bg-white text-black text-xs md:text-sm font-bold uppercase tracking-[0.2em] hover:bg-neutral-200 hover:-translate-y-1 transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.2)] w-full sm:w-auto">
                               Deposit and withdrawal
                           </a>
                           <a href="https://login.longasiagroups.com/" target="_blank" className="px-8 py-4 border border-white/30 text-white text-xs md:text-sm font-bold uppercase tracking-[0.2em] hover:bg-white/5 hover:-translate-y-1 transition-all duration-300 w-full sm:w-auto">
                               User login
                           </a>
                       </div>
                   </header>

                   {/* Main Content Area - Updated to Tabbed Interface */}
                   <main className="max-w-7xl mx-auto px-4 sm:px-8 pb-32 flex flex-col lg:flex-row gap-16 animate-fade-up delay-500 relative z-10">
                       {/* Sidebar Index */}
                       <aside className="lg:w-1/4">
                           <div className="sticky top-40 bg-white/5 border border-white/10 p-6 backdrop-blur-md">
                               <p className="text-[10px] tracking-widest uppercase text-neutral-500 mb-6">Index</p>
                               {faqData.map(cat => (
                                   <button
                                       key={cat.id}
                                       onClick={() => {
                                           setActive(cat.id);
                                           // Smooth scroll to content on mobile devices when an index is clicked
                                           if(window.innerWidth < 1024) {
                                               const el = document.getElementById('faq-content-area');
                                               if (el) {
                                                   const yOffset = -120;
                                                   const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
                                                   window.scrollTo({ top: y, behavior: 'smooth' });
                                               }
                                           }
                                       }}
                                       className={`w-full text-left py-4 px-4 mb-1 transition-all flex items-center gap-4 ${active === cat.id ? 'bg-white text-black shadow-[0_0_15px_rgba(255,255,255,0.5)]' : 'text-neutral-500 hover:text-white hover:bg-white/5'}`}
                                   >
                                       <Icon path={cat.icon} />
                                       <span className="text-xs sm:text-sm font-bold uppercase tracking-wider">{cat.title}</span>
                                   </button>
                               ))}
                           </div>
                       </aside>

                       {/* Active FAQ Section */}
                       <section id="faq-content-area" className="lg:w-3/4 min-h-[500px]">
                           {/* We use a key based on active ID so React remounts the div, triggering the animation again */}
                           <div key={activeCategoryData.id} className="animate-fade-in-content">
                               <h2 className="text-xl sm:text-2xl font-bold uppercase tracking-widest mb-10 border-b border-white/10 pb-4 leading-relaxed">
                                   {activeCategoryData.title}
                               </h2>
                               {activeCategoryData.questions.map((q, i) => <FAQItem key={i} {...q} />)}
                           </div>
                       </section>
                   </main>

                   {/* Footer */}
                   <footer className="border-t border-white/10 py-20 px-4 sm:px-8 flex flex-col md:flex-row items-center justify-between bg-black relative z-10">
                       {/* Footer Logo */}
                       <img src="https://i.ibb.co/kVwvjjrR/long-asia-png.png" className="h-24 md:h-[120px] grayscale brightness-0 invert opacity-50 hover:opacity-100 transition-all duration-500 mb-8 md:mb-0" alt="Logo" />
                       <div className="text-center md:text-left">
                           <p className="text-[10px] tracking-widest text-neutral-600 uppercase mb-2">© 2026 Long Asia. Global Network.</p>
                           <a href="mailto:support@longasiagroups.com" className="text-xs tracking-widest text-neutral-400 hover:text-white transition-colors">SUPPORT@LONGASIAGROUPS.COM</a>
                       </div>
                       <div className="flex space-x-6 text-xs font-mono tracking-widest uppercase text-neutral-500 mt-8 md:mt-0">
                           <a href="#" className="hover:text-white transition-colors">Privacy</a>
                           <a href="#" className="hover:text-white transition-colors">Terms</a>
                           <a href="#" className="hover:text-white transition-colors">Security</a>
                       </div>
                   </footer>
               </div>
           );
       };

       const root = ReactDOM.createRoot(document.getElementById('root'));
       root.render(<App />);
   </script>
</body>
</html>
